services:
  mongodb:
    image: mongo:7
    container_name: lead_dashboard_mongodb
    restart: unless-stopped
    ports: ["27017:27017"]
    volumes: [mongodb_data:/data/db]
    environment: { MONGO_INITDB_DATABASE: lead_dashboard }
  server:
    build: ./server
    container_name: lead_dashboard_server
    restart: unless-stopped
    ports: ["5000:5000"]
    environment:
      NODE_ENV: production
      PORT: ${PORT:-5000}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/lead_dashboard}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY:?ADMIN_SECRET_KEY is required}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-}
    depends_on: [mongodb]
  client:
    build: ./client
    container_name: lead_dashboard_client
    restart: unless-stopped
    ports: ["80:80"]
    depends_on: [server]
volumes: { mongodb_data: }
